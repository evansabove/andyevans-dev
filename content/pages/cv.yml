biography:
  image: /andyevans.jpeg
  imageAlt: "Andy Evans"
  text: |
    <p>I'm Andy, software engineer from Sheffield, UK. I'm a flexible and adaptable senior engineer currently working for a software consultancy.</p>
    <p>I'm a resilient and logical problem solver with creative ideas on solutions. I develop software in whatever tools the problem demands — primarily C# — and I take the lead on platform engineering, CI/CD, and Azure cloud deployments. I'm also passionate about mentoring and building great teams.</p>

aboutMe:
  - title: "I problem solve!"
    text: "I'm a resilient and logical problem solver, with creative ideas on solutions. Although I work hard to find the ideal solution, I'm pragmatic enough to know when to look for alternative options."
  - title: "Software engineering"
    text: "I develop software to solve problems - using whatever tools I need. This is usually C#, but has in the past led to adventures in Vue, Python, and Android to name but a few. I'm also a certified Azure Developer Associate."
  - title: "I learn"
    text: "Tech is constantly evolving! If my existing skillset doesn't contain the tools for the problem at hand, I set about learning what I need - languages / tools / libraries - to get the job done."
  - title: "Platform engineering"
    text: "I've always said that it's no good writing code unless you can deploy it somewhere! I take the lead in deploying solutions to the Azure cloud, working with CI/CD pipelines, and also have experience with Kubernetes and on-prem infrastructure."
  - title: "Planning and backlog management"
    text: "I write user stories to represent the problems to be solved, and manage these stories in a backlog. I own the stories through development, testing and deployment, being a point of contact for the team. I also provide estimates for the work."
  - title: "Mentoring"
    text: "One of my most important roles is to mentor other team members - formally, or informally. I like to be a person that is trusted and approachable, and a person who can help to build the careers of others."

